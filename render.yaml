services:
  - type: web
    name: quyingwen-academy-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npx prisma generate && npx prisma db push
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prisma/dev.db
      - key: JWT_SECRET
        value: quyingwen-academy-secret-2024
      - key: PORT
        value: 10000
